<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Meta Test Project v1 (Loose Inspo)</title><style>body{font-family:Inter,system-ui,sans-serif;background:#0b1220;color:#eef2ff;margin:0;padding:24px}h1{margin:0 0 8px}p.lead{color:#b7c3d9;max-width:900px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:24px}.card{background:#131c30;border:1px solid #24314f;border-radius:16px;overflow:hidden}.visual{position:relative;background:#0f172a}.card img{display:block;width:100%;height:auto;background:#0f172a}.card .pad{padding:14px}.k{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#7dd3fc}.card h2{font-size:18px;margin:6px 0 10px}.card p{font-size:14px;line-height:1.5;color:#d7def0;white-space:pre-line}</style></head><body><h1>Meta Test Project v1 (Loose Inspo)</h1><p class="lead">Second-pass Futures Funding creative concepts. Loose logo inspiration.</p><div class="grid">

<section class="card">
<div class="visual"><img src="concept1-ghosted-draw.png" alt="Concept 1"></div>
<div class="pad"><div class="k">Concept 1: The Ghosted Draw</div><p id="cap1"></p></div>
</section>

<section class="card">
<div class="visual"><img src="concept2-reality-check.png" alt="Concept 2"></div>
<div class="pad"><div class="k">Concept 2: Reality Check</div><p id="cap2"></p></div>
</section>

<section class="card">
<div class="visual"><img src="concept3-anticorporate-jobsite.png" alt="Concept 3"></div>
<div class="pad"><div class="k">Concept 3: Anti-Corporate</div><p id="cap3"></p></div>
</section>

</div>
<script>
  fetch('concept1-caption.txt').then(r=>r.text()).then(t=>document.getElementById('cap1').innerText=t);
  fetch('concept2-caption.txt').then(r=>r.text()).then(t=>document.getElementById('cap2').innerText=t);
  fetch('concept3-caption.txt').then(r=>r.text()).then(t=>document.getElementById('cap3').innerText=t);
</script>
</body></html>
