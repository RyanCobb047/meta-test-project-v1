<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ad Run</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
        .card p { margin-top: 10px; font-size: 0.9em; color: #333; }
    </style>
</head>
<body>
    <h1>Meta Ad Run</h1>
    <div class="grid">
        <div class="card">
            <img src="concept-01-bait-and-switch.png" alt="concept-01">
            <p id="caption-01">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-02-fast-draws.png" alt="concept-02">
            <p id="caption-02">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-03-ghosted-chat.png" alt="concept-03">
            <p id="caption-03">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-04-local-blueprint.png" alt="concept-04">
            <p id="caption-04">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-05-junk-fee-jenga.png" alt="concept-05">
            <p id="caption-05">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-06-tech-bro-vs-partner.png" alt="concept-06">
            <p id="caption-06">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-07-marathon-not-sprint.png" alt="concept-07">
            <p id="caption-07">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-08-shredder.png" alt="concept-08">
            <p id="caption-08">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-09-rolodex-of-reality.png" alt="concept-09">
            <p id="caption-09">Loading...</p>
        </div>
        <div class="card">
            <img src="concept-10-tailored-suit.png" alt="concept-10">
            <p id="caption-10">Loading...</p>
        </div>
        <div class="card">
            <img src="2026-03-21-concept-1.png" alt="concept-11">
            <p id="caption-11">Loading...</p>
        </div>
        <div class="card">
            <img src="2026-03-21-concept-3.png" alt="concept-12">
            <p id="caption-12">Loading...</p>
        </div>
        <div class="card">
            <img src="2026-03-21-concept-5.png" alt="concept-13">
            <p id="caption-13">Loading...</p>
        </div>
    </div>

    <script>
        const captions = {
            "caption-01": "concept-01-bait-and-switch.txt",
            "caption-02": "concept-02-fast-draws.txt",
            "caption-03": "concept-03-ghosted-chat.txt",
            "caption-04": "concept-04-local-blueprint.txt",
            "caption-05": "concept-05-junk-fee-jenga.txt",
            "caption-06": "concept-06-tech-bro-vs-partner.txt",
            "caption-07": "concept-07-marathon-not-sprint.txt",
            "caption-08": "concept-08-shredder.txt",
            "caption-09": "concept-09-rolodex-of-reality.txt",
            "caption-10": "concept-10-tailored-suit.txt",
            "caption-11": "2026-03-21-concept-1-caption.txt",
            "caption-12": "2026-03-21-concept-3-caption.txt",
            "caption-13": "2026-03-21-concept-5-caption.txt"
        };

        async function loadCaptions() {
            for (const [id, url] of Object.entries(captions)) {
                try {
                    const response = await fetch(url);
                    const text = await response.text();
                    document.getElementById(id).innerText = text;
                } catch (e) {
                    console.error("Failed to load " + url, e);
                }
            }
        }
        loadCaptions();
    </script>
</body>
</html>
